<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation Tabs with Hover Effects</title>
    <style>
        /* Main page bubbles */
        .bubble-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .bubble {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .bubble:hover {
            transform: scale(1.05);
        }

        .bubble img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .bubble-text {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
        }

        /* Navigation Layout */
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f5f5f5;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .home {
            padding: 10px 20px;
            background: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .home:hover {
            background: #007bff;
            color: white;
        }

        .nav-right {
            display: flex;
            gap: 20px;
        }

        /* Dropdown menu */
        .dropdown {
            position: relative;
            cursor: pointer;
            padding: 15px 30px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .dropdown:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #007bff;
            color: white;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            width: 160px;
            z-index: 10;
        }

        .dropdown-content a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: black;
            transition: background 0.3s;
        }

        .dropdown-content a:hover {
            background: #007bff;
            color: white;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        /* Navigation tabs */
        .tab-section {
            display: none;
            padding: 20px;
        }

        .tab-section.active {
            display: block;
        }

        .nav-tabs {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #f5f5f5;
        }

        /* Home Logo */
        .home-logo {
           margin-right: 10px;
        }

        .home-logo img {
          width: 30px;
          height: 30px;
          cursor: pointer;
        }

        .tab {
            padding: 15px 30px;
            background: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .tab:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #007bff;
            color: white;
        }

        .content {
            display: none;
            padding: 20px;
        }

        .content.active {
            display: block;
        }

        /* Data table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        /* Return to Home Button */
        .return-home {
            margin-top: 20px;
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .return-home:hover {
            background: #c82333;
        }
    </style>

        function showTabSection(sectionId) {
            // Hide the bubble container
            document.querySelector('.bubble-container').style.display = 'none';

            // Hide all tab sections
            document.querySelectorAll('.tab-section').forEach(section => {
                section.classList.remove('active');
            });

            // Show the selected tab section
            document.getElementById(sectionId).classList.add('active');
        }

        function returnHome() {
            // Hide all tab sections
            document.querySelectorAll('.tab-section').forEach(section => {
                section.classList.remove('active');
            });

            // Show the bubble container
            document.querySelector('.bubble-container').style.display = 'flex';

        function switchTab0(tabIndex, sectionId) {
            // Get the active tab section
            const section = document.getElementById(sectionId);
            const tabs = section.querySelectorAll('.tab');
            const contents = section.querySelectorAll('.content');

            // Remove active classes
            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));

            // Activate the selected tab and its content
            tabs[tabIndex].classList.add('active');
            contents[tabIndex].classList.add('active');

            // Clear additional content when switching tabs
            if (sectionId === 'navigate') {
                document.getElementById('additionalContent0').innerHTML = '';
            }
        }
